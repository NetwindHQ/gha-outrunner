name: Test Outrunner

on:
  workflow_dispatch:
    inputs:
      labels:
        description: "runs-on labels (JSON array)"
        required: true
        default: '["self-hosted", "linux", "arm64"]'

jobs:
  smoke:
    runs-on: ${{ fromJSON(inputs.labels) }}
    steps:
      - run: echo "Hello from outrunner!"
      - run: uname -a
